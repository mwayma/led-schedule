apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: led-schedule-ingress
  labels:
    app: led-schedule
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - http:
        paths:
          # Webhooks (secured by tokens)
          - path: /api/v1/webhooks/.*
            pathType: Prefix
            backend:
              service:
                name: led-schedule-backend-service
                port:
                  number: 5000
          # Authenticated APIs (secured by JWT cookie)
          - path: /api/.*
            pathType: Prefix
            backend:
              service:
                name: led-schedule-backend-service
                port:
                  number: 5000
          # Frontend static files (HTML/JS/CSS)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: led-schedule-frontend-service
                port:
                  number: 80
